<!DOCTYPE html>
<html>
<head>
    <title> Burnout & Focus Guardian</title>
    <link rel="icon" href="image.png">

</head>
<body class="colour">
    

<h1>Burnout & Focus Guardian (AI Coach)</h1>

<div class="card">
    <input type="number" id="sleep" placeholder="Sleep Hours">
    <input type="number" id="work" placeholder="Work Hours">
    <input type="number" id="mood" placeholder="Mood (1–5)">
    <input type="number" id="meetings" placeholder="Meetings Count">
    <input type="number" id="caffeine" placeholder="Caffeine Cups">

    <button onclick="analyze()">Analyze Burnout</button>
</div>

<div id="result" class="result"></div>

<script src="script.js"></script>
</body>
</html>
